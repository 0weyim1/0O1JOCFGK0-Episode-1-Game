<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2048 Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <div class="header">
            <div class="title-area">
                <h1>2048</h1>
                <button id="gear-btn" class="icon-btn" onclick="toggleMenu()">⚙️</button>
            </div>
            <div class="right-header">
                <button id="new-game-btn" onclick="resetGame()">New Game</button>
            </div>
        </div>

        <div id="grid" class="grid"></div>

        <div id="game-over" class="hidden">
            <p>Game Over!</p>
            <button onclick="resetGame()">Try Again</button>
        </div>

        <div id="menu-overlay" class="overlay hidden">
            <div class="menu-content">
                <h2>How to Play</h2>
                <p>Swipe or use arrow keys to move the tiles. When two tiles with the same sentence match, they merge into one!</p>
                <p>Join the phrases to reach the final <strong>2048</strong> milestone to win!</p>
                <button class="close-btn" onclick="toggleMenu()">Back to Game</button>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
