<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2048 Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <div class="header">
            <div class="title-area">
                <h1>2048</h1>
                <button id="gear-btn" class="icon-btn" onclick="toggleMenu()">⚙️</button>
            </div>
            <div class="scores-wrapper">
                <div class="score-container">
                    <span class="score-label">Score</span>
                    <span id="score">0</span>
                </div>
                <div class="high-score-container">
                    <span class="score-label">Best</span>
                    <span id="high-score">0</span>
                </div>
            </div>
        </div>

        <div class="control-panel">
            <button id="new-game-btn" onclick="resetGame()">New Game</button>
        </div>

        <div id="grid" class="grid"></div>

        <div id="game-over" class="hidden">
            <p>Game Over!</p>
            <button onclick="resetGame()">Try Again</button>
        </div>

        <div id="menu-overlay" class="overlay hidden">
            <div class="menu-content">
                <h2>How to Play</h2>
                <p>Swipe or use your arrow keys to shift the sentence tiles.</p>
                <p>When two matching tiles collide, they combine to progress the story phrase!</p>
                <p>Strategize your steps to reach the final <strong>2048</strong> tile to win!</p>
                <button class="close-btn" onclick="toggleMenu()">Back to Game</button>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
